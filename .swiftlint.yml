# SwiftLint configuration for SwiftUI indie apps
# Optimized for small teams and rapid iteration

disabled_rules:
  - trailing_whitespace
  - line_length
  - todo
  - nesting

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - private_action
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

force_cast: warning
force_try: warning
force_unwrapping: warning

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - db
    - to
    - x
    - y

excluded:
  - ios/Widget/
  - ios/.build/
  - .build/

reporter: xcode
