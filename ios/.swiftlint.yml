# SwiftLint configuration for SwiftUI Indie Stack
# Optimized for small teams and rapid iteration

disabled_rules:
  - trailing_whitespace
  - line_length
  - todo
  - nesting
  - trailing_comma
  - multiple_closures_with_trailing_closure
  - implicit_optional_initialization
  - for_where
  - non_optional_string_data_conversion
  - unused_closure_parameter

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - private_action
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

force_cast: warning
force_try: warning
force_unwrapping: warning

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 25

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 650
  error: 900

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - db
    - to
    - x
    - y
    - vm
    - a
    - r
    - g
    - b
    - i

# Paths work from both project root and ios/ directory
excluded:
  - ios/Widget/
  - ios/.build/
  - ios/MyAppTests/
  - ios/MyAppUITests/
  - ios/Tests/
  - Widget/
  - .build/
  - MyAppTests/
  - MyAppUITests/
  - Tests/
  - Package.swift
  - ios/Package.swift

reporter: xcode
