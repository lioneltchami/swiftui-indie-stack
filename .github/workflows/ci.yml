name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # NOTE: April 2026 Xcode 26 mandate -- all App Store submissions must use Xcode 26+.
  # macos-26 runners are not yet available on all GitHub plan tiers.
  # Update runs-on to macos-26 and xcode-select path once GitHub supports it broadly.
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging
        working-directory: ios

  build-and-test:
    name: Build & Test iOS App
    runs-on: macos-15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ios/.build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          cd ios
          xcodebuild -project MyApp.xcodeproj \
            -scheme MyApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -quiet \
            build

      - name: Test
        run: |
          cd ios
          xcodebuild test \
            -project MyApp.xcodeproj \
            -scheme MyApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            -quiet

      - name: Convert Coverage
        if: success()
        run: |
          xcrun xccov view --report --json ios/TestResults.xcresult > coverage.json

      - name: Upload Coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-firebase-functions:
    name: Build Firebase Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase-functions/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: firebase-functions/functions/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
