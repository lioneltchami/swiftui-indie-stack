name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging
        working-directory: ios

  build:
    name: Build iOS App
    runs-on: macos-15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ios/.build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          cd ios
          xcodebuild -project MyApp.xcodeproj \
            -scheme MyApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet \
            build

      # NOTE: To enable testing in CI, add test targets in Xcode first:
      # 1. File > New > Target > Unit Testing Bundle > "MyAppTests"
      # 2. File > New > Target > UI Testing Bundle > "MyAppUITests"
      # 3. Enable MyAppTests in MyApp scheme > Test action
      # 4. Commit the updated .xcodeproj
      # Then uncomment the test step below.

  build-firebase-functions:
    name: Build Firebase Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase-functions/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: firebase-functions/functions/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
