name: iOS Tests

# NOTE: This workflow requires test targets to be configured in the Xcode project.
# Before this workflow can run, you must:
# 1. Open MyApp.xcodeproj in Xcode
# 2. File > New > Target > Unit Testing Bundle > name "MyAppTests"
# 3. File > New > Target > UI Testing Bundle > name "MyAppUITests"
# 4. Add test source files to each target
# 5. Enable MyAppTests in MyApp scheme > Test action
# 6. Commit the updated .xcodeproj

on:
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-tests.yml"
  push:
    branches: [main]
    paths:
      - "ios/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & Snapshot Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build and Test
        run: |
          cd ios
          xcodebuild test \
            -project MyApp.xcodeproj \
            -scheme MyApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ios/TestResults.xcresult

  ui-test:
    name: UI Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Run UI Tests
        run: |
          cd ios
          xcodebuild test \
            -project MyApp.xcodeproj \
            -scheme MyAppUITests \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: ios/UITestResults.xcresult
