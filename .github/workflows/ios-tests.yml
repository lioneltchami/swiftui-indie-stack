name: iOS Tests

# PREREQUISITE: This workflow requires test targets in the Xcode project.
# Before enabling, you must:
# 1. Open MyApp.xcodeproj in Xcode
# 2. File > New > Target > Unit Testing Bundle > name "MyAppTests"
# 3. File > New > Target > UI Testing Bundle > name "MyAppUITests"
# 4. Add test source files to each target
# 5. Enable MyAppTests in MyApp scheme > Test action
# 6. Commit the updated .xcodeproj
#
# Until then, keep this workflow disabled by setting the 'if' condition to false
# or removing the workflow file.

on:
  workflow_dispatch: # Manual trigger only until test targets are configured
  # Uncomment below once test targets exist:
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "ios/**"
  # push:
  #   branches: [main]
  #   paths:
  #     - "ios/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & Snapshot Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH"

      - name: Find simulator
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/.*(\(.*\)) .*/\1/')
          echo "id=$SIM_ID" >> $GITHUB_OUTPUT

      - name: Build and Test
        run: |
          cd ios
          xcodebuild test \
            -project MyApp.xcodeproj \
            -scheme MyApp \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.id }}" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ios/TestResults.xcresult

  ui-test:
    name: UI Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH"

      - name: Find simulator
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/.*(\(.*\)) .*/\1/')
          echo "id=$SIM_ID" >> $GITHUB_OUTPUT

      - name: Run UI Tests
        run: |
          cd ios
          xcodebuild test \
            -project MyApp.xcodeproj \
            -scheme MyAppUITests \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.id }}" \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: ios/UITestResults.xcresult
